<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>修復 Sky Lens</title><style>html,body{margin:0;min-height:100%;background:#07111f;color:#eef8ff;font-family:system-ui,"Noto Sans TC"}body{display:grid;place-items:center;padding:24px}.card{width:min(88vw,390px);padding:28px 22px;border-radius:25px;text-align:center;background:#0a1727;border:1px solid #bfe4ff30;box-shadow:0 24px 70px #0008}.icon{font-size:48px}h1{font-size:24px;margin:14px 0 8px}p{color:#a9bed0;line-height:1.65;font-size:14px}.bar{height:8px;border-radius:99px;background:#1c3044;overflow:hidden;margin-top:20px}.bar i{display:block;height:100%;width:25%;border-radius:inherit;background:#9edfff;animation:move 1.1s ease-in-out infinite alternate}@keyframes move{to{width:100%}}button{width:100%;margin-top:18px;padding:14px;border:0;border-radius:15px;background:#a9e5ff;color:#07111f;font-weight:800}</style></head><body><main class="card"><div class="icon">✦</div><h1>正在修復 Sky Lens</h1><p id="status">正在移除卡住的舊快取與更新程序，主畫面圖示不需要刪除。</p><div class="bar"><i></i></div><button id="retry" hidden>重新嘗試</button></main><script>const status=document.querySelector('#status'),retry=document.querySelector('#retry');async function repair(){retry.hidden=true;try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.filter(r=>r.scope.includes('/sky-lens/')).map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('sky-lens-pwa-')).map(k=>caches.delete(k)))}sessionStorage.clear();status.textContent='修復完成，正在載入新版…';setTimeout(()=>location.replace(`./?recovered=${Date.now()}`),500)}catch(error){status.textContent='自動修復未完成，請確認網路後再試一次。';retry.hidden=false}}retry.addEventListener('click',repair);repair();</script></body></html>
